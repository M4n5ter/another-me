services:
  surrealdb:
    env_file:
      - .env
    entrypoint:
      - /surreal 
      - start 
      - --user
      - $SURREALDB_USER
      - --pass
      - $SURREALDB_PASSWORD
    image: surrealdb/surrealdb:latest
    ports:
      - 8000:8000
    restart: unless-stopped

  another-me-pg:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Postgres.Dockerfile
      args:
        ALL_PROXY: ${ALL_PROXY:-}
      extra_hosts:
        - "host.docker.internal:host-gateway"
    container_name: another-me-pg
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pgpassword}
      POSTGRES_DB: ${POSTGRES_DB:-another_me_db}
    ports:
      - "5432:5432"
    volumes:
      - another-me-pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  another-me-pg_data:
    driver: local
